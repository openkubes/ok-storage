# Source PVC + pod for ok-storage-block data-duplication verification.
# Not part of the ok-storage contract itself -- safe to apply and delete
# any time.
#
# This creates only the source PVC + pod. See README's Testing section for
# the actual verification step (CSI volume clone into a new, independent
# PVC) and important context: Longhorn's CSI driver maps the Kubernetes-
# native VolumeSnapshot API to a Longhorn *backup* (upload to an external
# S3/NFS target), not a local snapshot -- so VolumeSnapshot-based
# snapshot/restore only works once a backup target is configured (not yet
# done; see docs/snapshot-semantics.md). CSI volume cloning below proves
# the same underlying guarantee (point-in-time data duplication into an
# independent volume) without requiring a backup target.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ok-storage-test-src
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ok-storage-block
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ok-storage-test-src
spec:
  containers:
    - name: test
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: ok-storage-test-src
