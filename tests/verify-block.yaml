# Verification manifest for ok-storage-block (RWO, replicated).
# Not part of the ok-storage contract itself -- safe to apply and delete
# any time to confirm the StorageClass actually works on this cluster.
#
# Usage:
#   kubectl --kubeconfig ~/.kube/ok-infra.yaml apply -f tests/verify-block.yaml
#   kubectl --kubeconfig ~/.kube/ok-infra.yaml wait --for=condition=Ready pod/ok-storage-test --timeout=60s
#   kubectl --kubeconfig ~/.kube/ok-infra.yaml exec ok-storage-test -- sh -c 'echo hello > /data/hello.txt && cat /data/hello.txt'
#
# Then check replica placement (see README's Testing section) and clean up:
#   kubectl --kubeconfig ~/.kube/ok-infra.yaml delete -f tests/verify-block.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ok-storage-test
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ok-storage-block
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ok-storage-test
spec:
  containers:
    - name: test
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: ok-storage-test
