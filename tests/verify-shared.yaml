# Verification manifest for ok-storage-shared (RWX).
# Not part of the ok-storage contract itself -- safe to apply and delete
# any time to confirm real shared access works on this cluster.
#
# Usage:
#   kubectl --kubeconfig ~/.kube/ok-infra.yaml apply -f tests/verify-shared.yaml
#   kubectl --kubeconfig ~/.kube/ok-infra.yaml wait --for=condition=Ready pod/ok-storage-test-a pod/ok-storage-test-b --timeout=120s
#
# Then write from pod A, read from pod B (see README's Testing section),
# and clean up:
#   kubectl --kubeconfig ~/.kube/ok-infra.yaml delete -f tests/verify-shared.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ok-storage-test-rwx
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: ok-storage-shared
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ok-storage-test-a
spec:
  containers:
    - name: test
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: ok-storage-test-rwx
---
apiVersion: v1
kind: Pod
metadata:
  name: ok-storage-test-b
spec:
  containers:
    - name: test
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: ok-storage-test-rwx
